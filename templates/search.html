<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<meta name="viewport"; content="device-width,initial-scale=1.0">
<style>
.search-theme {
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
  }

.search-theme .top-nav {
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  }

.search-theme .section {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(10px);

  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  }

.search-theme h3 {
  color: #FFD700;
  }

.search-theme .media-item {
  background: rgba(255,255,255,0.08);
  color: white;
  }

.search-theme .media-item a {
  background: linear-gradient(45deg, #FFD700, #FFA500);
  color: black;
  }
</style>
  <title>Search Results</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body class="search-theme">

  <!-- Top Nav -->
  <div class="top-nav">
    <h2>Zed-Beats</h2>

    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/media2">Media</a>
      <a href="/admin">Admin</a>
    </div>

    <a href="/login" class="sign-in-btn">Sign in</a>
  </div>

  <!-- Main Content -->
  <div class="main">

    <section class="section">
      <h3>Search Results</h3>

      {% if results %}
        {% for file in results %}
          <div class="media-item">
            <p>{{ file }}</p>

            <div class="actions">
              <a href="/media/music/{{ file }}">Play</a>

              <a href="{{ url_for('static', filename='uploads/' + file) }}" download>
                Download
              </a>
            </div>
          </div>
        {% endfor %}

      {% else %}
        <p>No results found.</p>
      {% endif %}
    </section>

  </div>

</body>
</html>
